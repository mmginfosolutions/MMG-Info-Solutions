<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMG Info Solutions</title>

<style>
/* Base body */
body, html {
    margin:0; padding:0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #0f1c3f;
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* Header */
header {
    background-color: #112a5e;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

/* Logo and site title */
.logo-title {
    display: flex;
    align-items: center;
}
.logo-title img {
    height: 50px;
    width: auto;
    margin-right: 15px;
}
.logo-title h1 {
    margin:0;
    font-size:22px;
    font-weight:700;
}

/* Navigation links */
nav {
    display:flex;
    gap:20px;
}
nav a {
    color:white;
    text-decoration:none;
    font-weight:600;
    font-size:15px;
}
nav a:hover { color:#ff7a00; }

/* Login container top-right */
#loginContainer {
    display:flex;
    align-items:center;
    gap:8px;
}
#loginContainer input[type="password"] {
    padding:6px 10px;
    border-radius:5px;
    border:none;
    font-size:14px;
    outline:none;
    width:140px;
}
#loginContainer button {
    background-color:#ff7a00;
    border:none;
    padding:6px 14px;
    border-radius:5px;
    color:white;
    font-weight:700;
    cursor:pointer;
    font-size:14px;
    transition:0.3s;
}
#loginContainer button:hover { background-color:#e06500; }

/* Protected content area */
main {
    flex:1 0 auto;
    max-width:900px;
    margin:40px auto 60px;
    padding:20px;
    background-color:#132856;
    border-radius:8px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}

#content {
    display:none;
}

/* Table styles */
table {
    border-collapse: collapse;
    width: 100%;
    color:white;
    margin-top:15px;
}
th, td {
    border:1px solid #444;
    padding:10px;
    text-align:left;
}
th {
    background-color:#0f2a72;
    font-weight:700;
}

/* Download button inside content */
#content a button {
    background-color:#ff7a00;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
    font-weight:700;
    font-size:16px;
    color:white;
    margin-bottom:15px;
    transition:0.3s;
}
#content a button:hover { background-color:#e06500; }

/* Footer */
footer {
    background-color:#112a5e;
    text-align:center;
    padding:18px 10px;
    font-size:14px;
    color:#bbb;
    flex-shrink:0;
}

/* Logout button */
#logoutBtn {
    background-color:#ff7a00 !important;
    border:none;
    padding:6px 14px;
    border-radius:5px;
    color:white;
    font-weight:700;
    cursor:pointer;
    font-size:14px;
    margin-left:10px;
}
#logoutBtn:hover { background-color:#e06500 !important; }

/* Responsive for mobile */
@media(max-width:768px){
    header {
        flex-direction: column;
        align-items:flex-start;
        gap:10px;
    }
    nav { flex-wrap:wrap; gap:10px; }
    #loginContainer { margin-top:5px; }
}
</style>
</head>

<body>
<header>
    <div class="logo-title">
        <img src="your-logo.png" alt="MMG Logo">
        <h1>MMG Info Solutions</h1>
    </div>

    <nav>
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="#why-choose-us">Why Choose Us</a>
        <a href="#ideals">Ideals</a>
        <a href="#contact">Contact</a>
    </nav>

    <div id="loginContainer">
        <input type="password" id="password" placeholder="Password">
        <button onclick="checkLogin()">Login</button>
    </div>
</header>

<main>
    <div id="content">
        <a href="data.csv" download>
            <button>Download CSV</button>
        </a>
        <table id="dataTable"></table>
    </div>
</main>

<footer>
    © 2026 MMG Info Solutions. All rights reserved.
</footer>

<!-- CSV parser -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
function checkLogin(){
    const pass = document.getElementById("password").value;
    if(pass==="admin@2026"){
        document.getElementById("loginContainer").style.display="none";
        document.getElementById("content").style.display="block";
        loadCSV();
        addLogoutButton();
    }else{
        alert("Wrong password!");
    }
}

function loadCSV(){
    Papa.parse("data.csv",{download:true,complete:function(results){
        const table=document.getElementById("dataTable");
        table.innerHTML="";
        if(results.data.length>0){
            const thead=document.createElement("thead");
            const tr=document.createElement("tr");
            results.data[0].forEach(header=>{
                const th=document.createElement("th");
                th.innerText=header;
                tr.appendChild(th);
            });
            thead.appendChild(tr);
            table.appendChild(thead);
        }
        const tbody=document.createElement("tbody");
        for(let i=1;i<results.data.length;i++){
            const row=results.data[i];
            if(row.length===1 && row[0].trim()==="") continue;
            const tr=document.createElement("tr");
            row.forEach(cell=>{
                const td=document.createElement("td");
                td.innerText=cell;
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        }
        table.appendChild(tbody);
    }});
}

function addLogoutButton(){
    const loginContainer=document.getElementById("loginContainer");
    const logoutBtn=document.createElement("button");
    logoutBtn.id="logoutBtn";
    logoutBtn.innerText="Logout";
    logoutBtn.onclick=logout;
    loginContainer.parentElement.appendChild(logoutBtn);
}

function logout(){
    document.getElementById("content").style.display="none";
    document.getElementById("loginContainer").style.display="flex";
    document.getElementById("password").value="";
    const logoutBtn=document.getElementById("logoutBtn");
    if(logoutBtn) logoutBtn.remove();
}
</script>
</body>
</html>
