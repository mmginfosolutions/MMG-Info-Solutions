<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMG Info Solutions</title>

<style>
body {font-family: Arial; margin:0; background:#f5f7fa;}
header {display:flex; align-items:center; padding:15px; background:#fff;}
header img {height:60px; margin-right:15px;}
section {padding:25px;}
.card {background:#fff; padding:20px; margin-bottom:15px; border-radius:8px;}
button {padding:10px; background:#007BFF; color:white; border:none;}
#loginBox {display:none; text-align:center; margin-top:20px;}
#dataSection {display:none;}
table {border-collapse:collapse; width:100%;}
th, td {border:1px solid #ddd; padding:8px;}
</style>

</head>

<body>

<header>
<img src="logo.png">
<h2>MMG INFO SOLUTIONS</h2>
</header>

<section>
<h3>Welcome</h3>
<p><b>Simplifying trade & compliance—so you can focus on growth.</b></p>
</section>

<section class="card">
<h3>Core Services</h3>
<ul>
<li>IEC</li>
<li>RCMC</li>
<li>RoDTEP & RoSCTL</li>
<li>SIMS</li>
<li>CoO</li>
<li>Insurance</li>
</ul>
</section>

<!-- VIEW DATA BUTTON -->
<section class="card">
<h3>Authorized Data Access</h3>
<button onclick="showLogin()">View Data</button>

<div id="loginBox">
<br>
<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

</section>

<!-- DATA TABLE -->
<section id="dataSection" class="card">
<h3>CSV Data</h3>
<button onclick="logout()" style="background:red;">Logout</button>
<br><br>
<table id="dataTable"></table>
</section>

<script>
function showLogin(){
document.getElementById("loginBox").style.display="block";
}

function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
localStorage.setItem("auth","yes");
loadCSV();
document.getElementById("dataSection").style.display="block";
document.getElementById("loginBox").style.display="none";
}else{
alert("Invalid Login");
}
}

function logout(){
localStorage.removeItem("auth");
document.getElementById("dataSection").style.display="none";
}

function loadCSV(){
fetch("data.csv")
.then(res => res.text())
.then(data => {
let rows = data.split("\n");
let table = document.getElementById("dataTable");
table.innerHTML="";

rows.forEach((row, index)=>{
let cols = row.split(",");
let tr="<tr>";

cols.forEach(col=>{
tr += index===0 ? "<th>"+col+"</th>" : "<td>"+col+"</td>";
});

tr+="</tr>";
table.innerHTML+=tr;
});
});
}

// Auto show if already logged in
if(localStorage.getItem("auth")==="yes"){
document.getElementById("dataSection").style.display="block";
loadCSV();
}
</script>

</body>
</html>
