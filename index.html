<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MMG Info Solutions</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0b1a40;
      color: white;
    }

    header {
      background-color: #0f2a72;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      height: 50px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    nav a {
      color: #ff7a00;
      text-decoration: none;
      font-weight: bold;
    }

    #login-form {
      display: flex;
      gap: 10px;
    }

    #login-button, #logout-button {
      background: #ff7a00;
      border: none;
      padding: 6px 12px;
      color: white;
      cursor: pointer;
    }

    main {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1, h2 {
      color: #ff7a00;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #444;
      padding: 10px;
    }

    #protected-content {
      display: none;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="Logo">
    <span>MMG Info Solutions</span>
  </div>

  <nav>
    <ul>
      <li><a href="#welcome">Home</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <form id="login-form" onsubmit="return false;">
    <input type="password" id="password-input" placeholder="Password">
    <button id="login-button">Login</button>
    <button id="logout-button" type="button" style="display:none;">Logout</button>
  </form>
</header>

<main>

<section id="welcome">
  <h1>Welcome to MMG Info Solutions</h1>
  <p>Simplifying trade & compliance.</p>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Phone: +91-9867965837</p>
  <p>Email: mmginfosolutions@gmail.com</p>
</section>

<!-- Protected Section -->
<section id="protected-content">
  <h2>Protected Data (CSV)</h2>
  <div id="csv-table"></div>
</section>

</main>

<script>
const PASSWORD = "MMG@2026";

const loginForm = document.getElementById("login-form");
const passwordInput = document.getElementById("password-input");
const loginButton = document.getElementById("login-button");
const logoutButton = document.getElementById("logout-button");
const protectedContent = document.getElementById("protected-content");

function loadCSV() {
  fetch("data.csv")
    .then(res => res.text())
    .then(data => {
      let rows = data.trim().split("\n");
      let table = "<table><tr>";

      rows[0].split(",").forEach(h => {
        table += "<th>" + h + "</th>";
      });

      table += "</tr>";

      for (let i = 1; i < rows.length; i++) {
        table += "<tr>";
        rows[i].split(",").forEach(c => {
          table += "<td>" + c + "</td>";
        });
        table += "</tr>";
      }

      table += "</table>";
      document.getElementById("csv-table").innerHTML = table;
    })
    .catch(() => {
      document.getElementById("csv-table").innerHTML = "Error loading CSV";
    });
}

function showProtectedContent() {
  protectedContent.style.display = "block";
  loginButton.style.display = "none";
  logoutButton.style.display = "inline-block";
  passwordInput.style.display = "none";
  loadCSV();
}

function hideProtectedContent() {
  protectedContent.style.display = "none";
  loginButton.style.display = "inline-block";
  logoutButton.style.display = "none";
  passwordInput.style.display = "inline-block";
}

loginForm.addEventListener("submit", () => {
  if (passwordInput.value === PASSWORD) {
    localStorage.setItem("login", "true");
    showProtectedContent();
  } else {
    alert("Wrong Password");
  }
});

logoutButton.addEventListener("click", () => {
  localStorage.removeItem("login");
  hideProtectedContent();
});

window.onload = () => {
  if (localStorage.getItem("login") === "true") {
    showProtectedContent();
  }
};
</script>

</body>
</html>
